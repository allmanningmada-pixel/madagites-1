name: Deploy Vite Site to GitHub Pages

on:
  push:
    branches: ["main"] # Modifiez par "master" si votre branche principale s'appelle master

  # Permet de lancer le déploiement manuellement depuis l'onglet Actions
  workflow_dispatch:

# Définit les permissions requises pour déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permet d'annuler les déploiements en cours si un nouveau commit est poussé
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Changez par 'yarn' ou 'pnpm' si vous n'utilisez pas npm

      - name: Install dependencies
        run: npm install # Utilise 'npm install' si vous n'avez pas de fichier package-lock.json

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite génère par défaut le site compilé dans le dossier 'dist'
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
